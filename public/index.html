<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Φοιτητικό Food Sharing</title>
    <style>
        /* Βασικό CSS για αρχή - Responsive Design */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #004494; }
        .toggle-link { text-align: center; margin-top: 1rem; color: #0056b3; cursor: pointer; text-decoration: underline; }
        .error-message { color: red; margin-bottom: 1rem; text-align: center; }
        .success-message { color: green; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title" style="text-align: center;">Σύνδεση στο UniBite</h2>
    
    <div id="message" class=""></div>

    <form id="auth-form">
        <div class="form-group">
            <label for="username">Όνομα Χρήστη</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label for="password">Κωδικός</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" id="submit-btn">Είσοδος</button>
    </form>

    <div class="toggle-link" id="toggle-mode">Δεν έχετε λογαριασμό; Εγγραφείτε εδώ.</div>
</div>

<script src="auth.js"></script>
</body>
</html>
